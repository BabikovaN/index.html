<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Флаєр A4</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

.page {
  width: 210mm;
  height: 297mm;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(3, 1fr);
}

/* фон емодзі */
.card {
  position: relative;
  border: 1px dashed #aaa;
  padding: 10px;
  box-sizing: border-box;
  background: linear-gradient(135deg, #e3f2fd, #fff3e0);
  overflow: hidden;
}

.card::before {
  content: "🌊✨💛🌴🌈☀️❤️🌊✨";
  position: absolute;
  font-size: 40px;
  opacity: 0.08;
  top: 10px;
  left: 10px;
  right: 10px;
  word-wrap: break-word;
}

/* сердечка */
.card::after {
  content: "💛❤️💛❤️💛❤️";
  position: absolute;
  bottom: 5px;
  right: 5px;
  font-size: 18px;
  opacity: 0.2;
}

.content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

h3 {
  margin: 0;
  text-align: center;
  color: #0077cc;
}

.qr {
  text-align: center;
}

.qr img {
  width: 70px;
}

.footer {
  font-size: 10px;
  text-align: center;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="page">

  <!-- повтор 6 раз -->

      <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://babikovan.github.io/BabikovaNBabikova/">
